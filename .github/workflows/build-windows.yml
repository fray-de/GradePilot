name: Build Windows EXE

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed by the release step on tag pushes

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name gradepilot `
            --noconfirm `
            --clean `
            --paths . `
            --collect-all gradepilot `
            --collect-all PyQt6 `
            --add-data "config.example.yaml;." `
            scripts/gradepilot_entry.py

      - name: Smoke test the EXE
        shell: pwsh
        run: |
          .\dist\gradepilot.exe --version

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradepilot-windows-${{ github.sha }}
          path: dist/gradepilot.exe
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gradepilot.exe
          generate_release_notes: true
          draft: false
          prerelease: false
